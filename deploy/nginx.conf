# ================================================================
# CORNERSTONE SCHOOLS — Nginx Configuration
# Place at: /etc/nginx/sites-available/cornerstoneschools.ug
# Enable with: sudo ln -s /etc/nginx/sites-available/cornerstoneschools.ug \
#                         /etc/nginx/sites-enabled/
# ================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name cornerstoneschools.ug www.cornerstoneschools.ug;

    # Allow Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cornerstoneschools.ug;

    ssl_certificate     /etc/letsencrypt/live/cornerstoneschools.ug/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cornerstoneschools.ug/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cornerstoneschools.ug$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cornerstoneschools.ug;

    # ── SSL ─────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cornerstoneschools.ug/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cornerstoneschools.ug/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/cornerstone_access.log;
    error_log  /var/log/nginx/cornerstone_error.log warn;

    # ── Rate limiting zones (defined in nginx.conf http block) ───
    # Add these to /etc/nginx/nginx.conf inside the http { } block:
    #   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
    #   limit_req_zone $binary_remote_addr zone=forms:10m rate=5r/m;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.flutterwave.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self' https://api.flutterwave.com; frame-src 'self' https://checkout.flutterwave.com https://www.google.com; object-src 'none';" always;

    # ── Hide server info ──────────────────────────────────────────
    server_tokens off;

    # ── Body size ─────────────────────────────────────────────────
    client_max_body_size 2M;
    client_body_timeout  12;
    client_header_timeout 12;
    keepalive_timeout     15;
    send_timeout          10;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml;

    # ── Block common exploit paths ────────────────────────────────
    location ~* \.(env|git|sql|log|bak|htaccess|htpasswd)$ { deny all; return 404; }
    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin/config) { deny all; return 404; }

    # ── API — proxy to Node.js ────────────────────────────────────
    location /api/ {
        # Rate limit API calls
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Webhook endpoint — no rate limit (Flutterwave needs reliable delivery)
        location /api/donate/webhook {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host            $host;
        }
    }

    # ── Static frontend files ─────────────────────────────────────
    root /var/www/cornerstone/frontend;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ~* \.(jpg|jpeg|png|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML — never cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback — serve index.html for all non-API, non-file routes
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Deny access to admin directory except from known IPs (optional — uncomment)
    # location /admin/ {
    #     allow 197.157.0.0/16;   # Your office IP range
    #     deny  all;
    # }
}
